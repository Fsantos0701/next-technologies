<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta — Next Technologies</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230B1229%22/><path d=%22M28 70V30h9l26 27V30h9v40h-9L37 43v27z%22 fill=%22%2300E0C6%22/></svg>">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="bg-fx" aria-hidden="true"></div>

<div class="auth-page">
  <a href="/" class="logo auth-logo">
    <svg width="34" height="34" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="22" fill="url(#logoGrad)"/>
      <path d="M28 70V30h9l26 27V30h9v40h-9L37 43v27z" fill="#061024"/>
      <defs>
        <linearGradient id="logoGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
          <stop stop-color="#00E0C6"/><stop offset="1" stop-color="#2F6BFF"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="logo-word">NEXT <b>TECHNOLOGIES</b></span>
  </a>

  <div class="auth-card">
    <!-- Etapa 1: dados da conta -->
    <div id="stepForm">
      <h1>Criar sua conta</h1>
      <p class="auth-sub">Comece a receber com a Next Technologies em minutos.</p>

      <form id="signupForm" class="auth-form" novalidate>
        <label>
          Nome completo
          <input type="text" name="name" placeholder="Seu nome" required autocomplete="name">
        </label>
        <label>
          E-mail
          <input type="email" name="email" placeholder="voce@empresa.com" required autocomplete="email">
        </label>
        <label>
          Senha
          <div class="password-field">
            <input type="password" name="password" id="signupPassword" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" minlength="8">
            <button type="button" class="password-toggle" data-target="signupPassword" aria-label="Mostrar senha">
              <svg class="icon"><use href="#icon-eye"></use></svg>
            </button>
          </div>
        </label>
        <span class="auth-error" id="formError"></span>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Continuar</button>
      </form>

      <p class="auth-switch">Já tem conta? <a href="/login.html">Entrar</a></p>
    </div>

    <!-- Etapa 2: código de verificação -->
    <div id="stepCode" style="display:none">
      <h1>Confirme seu e-mail</h1>
      <p class="auth-sub">Enviamos um código de 6 dígitos para <strong id="codeEmailLabel"></strong>.</p>

      <form id="codeForm" class="auth-form" novalidate>
        <label>
          Código de verificação
          <input type="text" name="code" id="codeInput" placeholder="000000" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code">
        </label>
        <span class="auth-error" id="codeError"></span>
        <span class="auth-note" id="devNote" style="display:none"></span>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Confirmar e criar conta</button>
      </form>

      <p class="auth-switch">
        Não recebeu? <a href="#" id="resendLink">Reenviar código</a>
        · <a href="#" id="backLink">Voltar</a>
      </p>
    </div>
  </div>
</div>

<svg class="icon-sprite" aria-hidden="true" focusable="false">
  <defs>
    <symbol id="icon-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="icon-eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.7 19.7 0 0 1 5.06-5.94M9.9 4.24A10.4 10.4 0 0 1 12 4c7 0 11 8 11 8a19.7 19.7 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></symbol>
  </defs>
</svg>

<script src="auth.js"></script>
<script>
  const stepForm = document.getElementById('stepForm');
  const stepCode = document.getElementById('stepCode');
  const signupForm = document.getElementById('signupForm');
  const codeForm = document.getElementById('codeForm');
  const formError = document.getElementById('formError');
  const codeError = document.getElementById('codeError');
  const devNote = document.getElementById('devNote');
  const codeEmailLabel = document.getElementById('codeEmailLabel');
  const resendLink = document.getElementById('resendLink');
  const backLink = document.getElementById('backLink');

  let pendingEmail = '';
  let pendingName = '';
  let pendingPassword = '';

  function showDevNote(devMode) {
    if (devMode) {
      devNote.style.display = 'block';
      devNote.textContent = 'Modo de teste: nenhuma chave de e-mail configurada ainda — veja o código no console do servidor (terminal onde o site está rodando).';
    } else {
      devNote.style.display = 'none';
      devNote.textContent = '';
    }
  }

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    formError.textContent = '';
    const data = Object.fromEntries(new FormData(signupForm).entries());
    const btn = signupForm.querySelector('button');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      const res = await fetch('/api/signup/request-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const body = await res.json();
      if (!res.ok) { formError.textContent = body.error || 'Algo deu errado.'; return; }

      pendingEmail = data.email;
      pendingName = data.name;
      pendingPassword = data.password;
      codeEmailLabel.textContent = pendingEmail;
      showDevNote(body.devMode);
      stepForm.style.display = 'none';
      stepCode.style.display = 'block';
      document.getElementById('codeInput').focus();
    } catch (err) {
      formError.textContent = 'Não foi possível conectar ao servidor.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Continuar';
    }
  });

  codeForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    codeError.textContent = '';
    const code = document.getElementById('codeInput').value.trim();
    const btn = codeForm.querySelector('button');
    btn.disabled = true;
    btn.textContent = 'Confirmando...';

    try {
      const res = await fetch('/api/signup/verify-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingEmail, code }),
      });
      const body = await res.json();
      if (!res.ok) { codeError.textContent = body.error || 'Código inválido.'; return; }

      window.location.href = '/dashboard.html';
    } catch (err) {
      codeError.textContent = 'Não foi possível conectar ao servidor.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Confirmar e criar conta';
    }
  });

  resendLink.addEventListener('click', async (e) => {
    e.preventDefault();
    codeError.textContent = '';
    codeError.style.color = '';
    resendLink.textContent = 'Reenviando...';

    try {
      let res = await fetch('/api/signup/resend-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingEmail }),
      });
      let body = await res.json();

      // Cadastro pendente expirou (passou de 10 min) — recria do zero, sem pedir pra voltar.
      if (!res.ok && pendingName && pendingPassword) {
        res = await fetch('/api/signup/request-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: pendingName, email: pendingEmail, password: pendingPassword }),
        });
        body = await res.json();
      }

      if (!res.ok) { codeError.textContent = body.error || 'Não foi possível reenviar.'; return; }
      showDevNote(body.devMode);
      codeError.textContent = 'Novo código enviado.';
      codeError.style.color = 'var(--accent)';
      document.getElementById('codeInput').value = '';
      document.getElementById('codeInput').focus();
    } catch (err) {
      codeError.textContent = 'Não foi possível conectar ao servidor.';
    } finally {
      resendLink.textContent = 'Reenviar código';
    }
  });

  backLink.addEventListener('click', (e) => {
    e.preventDefault();
    stepCode.style.display = 'none';
    stepForm.style.display = 'block';
  });
</script>
</body>
</html>
